services:
  react:
    build:
      context: ./frontend
    container_name: capstone-react
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - spring

  spring:
    container_name: capstone-spring
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: capstone
      DB_USER: capstone
      DB_PASSWORD: 1234
      FASTAPI_BASE_URL: http://fastapi:8000
    depends_on:
      - db
      - fastapi

  fastapi:
    build:
      context: ./fastapi
    container_name: capstone-fastapi
    ports:
      - "8000:8000"
    volumes:
      - ./fastapi:/app
    env_file:
      - ./fastapi/.env
    environment:
      PYTHONUNBUFFERED: 1
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:16
    container_name: capstone-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: capstone
      POSTGRES_USER: capstone
      POSTGRES_PASSWORD: 1234
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: