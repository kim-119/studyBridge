<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>StudyBridge AI 테스트</title>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
      background: #f5f5f5;
    }

    section {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
    }

    button {
      margin-top: 10px;
      padding: 8px 14px;
      cursor: pointer;
    }

    .chat-box {
      background: #111827;
      color: white;
      padding: 15px;
      border-radius: 10px;
      white-space: pre-wrap;
      min-height: 150px;
    }

    .timer {
      font-size: 42px;
      font-weight: bold;
      margin: 15px 0;
    }

    .bar {
      background: #4f46e5;
      color: white;
      padding: 5px;
      margin: 5px 0;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<h1>StudyBridge AI 학습 도우미 테스트</h1>

<section>
  <h2>1. 서버 상태 확인</h2>
  <button onclick="checkHealth()">서버 상태 확인</button>
  <pre id="healthResult"></pre>
</section>

<section>
  <h2>2. 강의계획서 파일 업로드 기반 AI 로드맵 생성</h2>

  <label>과목명</label><br>
  <input id="subject" type="text" value="머신러닝"><br><br>

  <label>학습자 수준</label><br>
  <select id="level">
    <option value="초급자">초급자</option>
    <option value="중급자">중급자</option>
    <option value="마스터">마스터</option>
  </select><br><br>

  <label>강의계획서 파일 업로드(txt 또는 pdf)</label><br>
  <input id="fileInput" type="file" accept=".txt,.pdf"><br>

  <button onclick="uploadRoadmap()">AI 로드맵 생성</button>

  <h3>AI 응답</h3>
  <div id="roadmapResult" class="chat-box">로드맵 결과가 여기에 표시됩니다.</div>
</section>

<section>
  <h2>3. 공부 타이머</h2>
  <div id="timer" class="timer">00:00:00</div>
  <button onclick="startTimer()">공부 시작</button>
  <button onclick="stopTimer()">일시정지</button>
  <button onclick="resetTimer()">초기화</button>
  <p id="timerStatus">대기 중</p>
</section>

<section>
  <h2>4. 주간 활동 테스트</h2>
  <button onclick="checkWeekly()">주간 활동 불러오기</button>
  <h3 id="weeklySummary"></h3>
  <div id="weeklyChart"></div>
</section>

<script>
  const API_BASE = "http://127.0.0.1:9090";

  // 에러 메시지 안전 추출 함수
  function getErrorMessage(error) {
    if (error.response) {
      if (typeof error.response.data === "string") {
        return error.response.data;
      }

      if (error.response.data?.message) {
        return error.response.data.message;
      }

      return JSON.stringify(error.response.data, null, 2);
    }

    return error.message || "알 수 없는 오류";
  }

  async function checkHealth() {
    const resultBox = document.getElementById("healthResult");

    try {
      const res = await axios.get(`${API_BASE}/health`);

      resultBox.textContent = JSON.stringify(res.data, null, 2);
    } catch (error) {
      resultBox.textContent = "요청 실패: " + getErrorMessage(error);
      console.error(error);
    }
  }

  async function uploadRoadmap() {
    const subject = document.getElementById("subject").value;
    const level = document.getElementById("level").value;
    const file = document.getElementById("fileInput").files[0];
    const resultBox = document.getElementById("roadmapResult");

    if (!file) {
      alert("강의계획서 파일을 선택하세요.");
      return;
    }

    resultBox.textContent = "AI가 로드맵을 생성하는 중입니다...";

    const formData = new FormData();
    formData.append("subject", subject);
    formData.append("level", level);
    formData.append("file", file);

    try {
      const res = await axios.post(`${API_BASE}/ai/roadmap-file`, formData, {
        headers: {
          "Content-Type": "multipart/form-data"
        }
      });

      if (typeof res.data === "string") {
        resultBox.textContent = res.data;
      } else if (res.data.message) {
        resultBox.textContent = res.data.message;
      } else {
        resultBox.textContent = JSON.stringify(res.data, null, 2);
      }

    } catch (error) {
      resultBox.textContent = "요청 실패: " + getErrorMessage(error);
      console.error(error);
    }
  }

  let timerInterval = null;
  let seconds = 0;

  function formatTime(totalSeconds) {
    const h = String(Math.floor(totalSeconds / 3600)).padStart(2, "0");
    const m = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, "0");
    const s = String(totalSeconds % 60).padStart(2, "0");
    return `${h}:${m}:${s}`;
  }

  function updateTimerView() {
    document.getElementById("timer").textContent = formatTime(seconds);
  }

  function startTimer() {
    if (timerInterval !== null) return;

    document.getElementById("timerStatus").textContent = "공부 중";

    timerInterval = setInterval(() => {
      seconds++;
      updateTimerView();
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
    document.getElementById("timerStatus").textContent = "일시정지";
  }

  function resetTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
    seconds = 0;
    updateTimerView();
    document.getElementById("timerStatus").textContent = "대기 중";
  }

  async function checkWeekly() {
    const body = {
      user_id: 1,
      data: [
        { day: "월", hours: 2 },
        { day: "화", hours: 1.5 },
        { day: "수", hours: 0 },
        { day: "목", hours: 3 },
        { day: "금", hours: 2 },
        { day: "토", hours: 4 },
        { day: "일", hours: 1 }
      ]
    };

    try {
      const res = await axios.post(`${API_BASE}/activity/weekly`, body, {
        headers: {
          "Content-Type": "application/json"
        }
      });

      const data = res.data;

      document.getElementById("weeklySummary").textContent =
        `총 ${data.total_hours}시간 / 평균 ${data.average_hours}시간 / 출석 ${data.attendance_days}일`;

      const chart = document.getElementById("weeklyChart");
      chart.innerHTML = "";

      data.data.forEach(item => {
        const bar = document.createElement("div");
        bar.className = "bar";
        bar.style.width = `${item.hours * 80 + 40}px`;
        bar.textContent = `${item.day}: ${item.hours}시간`;
        chart.appendChild(bar);
      });

    } catch (error) {
      document.getElementById("weeklySummary").textContent =
        "요청 실패: " + getErrorMessage(error);

      console.error(error);
    }
  }
</script>

</body>
</html>
